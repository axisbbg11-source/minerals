services:
  - type: web
    name: lunarspec-api
    runtime: python
    pythonVersion: "3.11"
    buildCommand: |
      pip install --upgrade pip
      pip install scipy==1.13.1 --prefer-binary
      pip install rasterio==1.3.10 --find-links https://girder.github.io/large_image_wheels --prefer-binary
      pip install -r requirements.txt --prefer-binary
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
    healthCheckPath: /
